<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Homework 3 - Patient Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Patient Registration - Homework 3</h1>
    <form id="patientForm" novalidate>
      <table>
        <tr>
          <td><label for="firstName">First Name *</label></td>
          <td>
            <input id="firstName" name="firstName" maxlength="30" placeholder="First name" title="Letters, apostrophes and hyphens allowed" required>
            <div class="hint">1–30 characters; letters, apostrophes, and hyphens only</div>
            <div class="error" id="err-firstName"></div>
          </td>
        </tr>
        <tr>
          <td><label for="middleInitial">Middle Initial</label></td>
          <td>
            <input id="middleInitial" name="middleInitial" maxlength="1" placeholder="M" title="Optional: single letter">
            <div class="error" id="err-middleInitial"></div>
          </td>
        </tr>
        <tr>
          <td><label for="lastName">Last Name *</label></td>
          <td>
            <input id="lastName" name="lastName" maxlength="30" placeholder="Last name" required title="Letters, apostrophes and hyphens allowed">
            <div class="error" id="err-lastName"></div>
          </td>
        </tr>
        <tr>
          <td><label>Date of Birth *</label></td>
          <td>
            <input id="dobMonth" maxlength="2" size="2" placeholder="MM" title="Month (MM)"> /
            <input id="dobDay" maxlength="2" size="2" placeholder="DD" title="Day (DD)"> /
            <input id="dobYear" maxlength="4" size="4" placeholder="YYYY" title="Year (YYYY)">
            <div class="error" id="err-dob"></div>
          </td>
        </tr>
        <tr>
          <td><label for="ssn">SSN (9 digits) *</label></td>
          <td>
            <input id="ssn" name="ssn" maxlength="11" placeholder="000-00-0000" title="Enter 9 digits; will format automatically" required>
            <div class="error" id="err-ssn"></div>
          </td>
        </tr>
        <tr>
          <td><label for="addr1">Address Line 1 *</label></td>
          <td>
            <input id="addr1" name="addr1" maxlength="30" placeholder="Street address" required>
            <div class="error" id="err-addr1"></div>
          </td>
        </tr>
        <tr>
          <td><label for="addr2">Address Line 2</label></td>
          <td>
            <input id="addr2" name="addr2" maxlength="30" placeholder="Apt, suite, etc.">
            <div class="error" id="err-addr2"></div>
          </td>
        </tr>
        <tr>
          <td><label for="city">City *</label></td>
          <td>
            <input id="city" name="city" maxlength="30" placeholder="City" required>
            <div class="error" id="err-city"></div>
          </td>
        </tr>
        <tr>
          <td><label for="state">State *</label></td>
          <td>
            <select id="state" required title="Select your state">
              <option value="">-- Select state --</option>
              <option value="AL">AL</option>
              <option value="AK">AK</option>
              <option value="AZ">AZ</option>
              <option value="AR">AR</option>
              <option value="CA">CA</option>
              <option value="CO">CO</option>
              <option value="CT">CT</option>
              <option value="DE">DE</option>
              <option value="DC">DC</option>
              <option value="FL">FL</option>
              <option value="GA">GA</option>
              <option value="HI">HI</option>
              <option value="ID">ID</option>
              <option value="IL">IL</option>
              <option value="IN">IN</option>
              <option value="IA">IA</option>
              <option value="KS">KS</option>
              <option value="KY">KY</option>
              <option value="LA">LA</option>
              <option value="ME">ME</option>
              <option value="MD">MD</option>
              <option value="MA">MA</option>
              <option value="MI">MI</option>
              <option value="MN">MN</option>
              <option value="MS">MS</option>
              <option value="MO">MO</option>
              <option value="MT">MT</option>
              <option value="NE">NE</option>
              <option value="NV">NV</option>
              <option value="NH">NH</option>
              <option value="NJ">NJ</option>
              <option value="NM">NM</option>
              <option value="NY">NY</option>
              <option value="NC">NC</option>
              <option value="ND">ND</option>
              <option value="OH">OH</option>
              <option value="OK">OK</option>
              <option value="OR">OR</option>
              <option value="PA">PA</option>
              <option value="PR">PR</option>
              <option value="RI">RI</option>
              <option value="SC">SC</option>
              <option value="SD">SD</option>
              <option value="TN">TN</option>
              <option value="TX">TX</option>
              <option value="UT">UT</option>
              <option value="VT">VT</option>
              <option value="VA">VA</option>
              <option value="WA">WA</option>
              <option value="WV">WV</option>
              <option value="WI">WI</option>
              <option value="WY">WY</option>
            </select>
            <div class="error" id="err-state"></div>
          </td>
        </tr>
        <tr>
          <td><label for="zip">Zip Code *</label></td>
          <td>
            <input id="zip" name="zip" maxlength="5" placeholder="12345" required>
            <div class="error" id="err-zip"></div>
          </td>
        </tr>
        <tr>
          <td><label for="email">Email *</label></td>
          <td>
            <input id="email" name="email" placeholder="name@domain.tld" required>
            <div class="error" id="err-email"></div>
          </td>
        </tr>
        <tr>
          <td><label for="comments">Comments</label></td>
          <td>
            <textarea id="comments" name="comments" rows="4" maxlength="500" placeholder="Add comments (max 500)"></textarea>
            <div class="error" id="err-comments"></div>
          </td>
        </tr>
        <tr>
          <td>Medical History (check all that apply)</td>
          <td>
            <label><input type="checkbox" name="symptom" value="Chicken Pox"> Chicken Pox</label>
            <label><input type="checkbox" name="symptom" value="Measles"> Measles</label>
            <label><input type="checkbox" name="symptom" value="Covid-19"> Covid-19</label>
            <label><input type="checkbox" name="symptom" value="Mumps"> Mumps</label>
            <label><input type="checkbox" name="symptom" value="Other"> Other</label>
            <div class="error" id="err-symptoms"></div>
          </td>
        </tr>
        <tr>
          <td>Housing</td>
          <td>
            <label><input type="radio" name="housing" value="Own"> Own</label>
            <label><input type="radio" name="housing" value="Rent"> Rent</label>
            <label><input type="radio" name="housing" value="Unsure"> Unsure</label>
            <div class="error" id="err-housing"></div>
          </td>
        </tr>
        <tr>
          <td>Vaccinated?</td>
          <td>
            <label><input type="radio" name="vaccinated" value="Yes"> Yes</label>
            <label><input type="radio" name="vaccinated" value="No"> No</label>
            <label><input type="radio" name="vaccinated" value="Unknown"> Unknown</label>
            <div class="error" id="err-vaccinated"></div>
          </td>
        </tr>
        <tr>
          <td><label for="salary">Desired Salary</label></td>
          <td>
            <input type="range" id="salary" min="20000" max="200000" step="1000" value="60000">
            <div id="salaryDisplay">$60,000.00</div>
            <div class="error" id="err-salary"></div>
          </td>
        </tr>
        <tr>
          <td><label for="userId">User ID *</label></td>
          <td>
            <input id="userId" name="userId" maxlength="20" placeholder="5-20 chars; letters, numbers, - _" required>
            <div class="error" id="err-userId"></div>
          </td>
        </tr>
        <tr>
          <td><label for="password">Password *</label></td>
          <td>
            <input id="password" name="password" type="password" placeholder="At least 8 chars" required>
            <div class="error" id="err-password"></div>
          </td>
        </tr>
        <tr>
          <td><label for="confirmPassword">Confirm Password *</label></td>
          <td>
            <input id="confirmPassword" name="confirmPassword" type="password" required>
            <div class="error" id="err-confirmPassword"></div>
          </td>
        </tr>
        <tr>
          <td colspan="2" class="actions">
            <button type="button" id="validateBtn">Validate</button>
            <button type="submit" id="submitBtn" disabled>Submit</button>
            <button type="reset" id="resetBtn">Start Over</button>
          </td>
        </tr>
      </table>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
